
<svg width="100%" viewBox="0 0 680 340">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- CA box top center -->
  <g class="c-amber">
    <rect x="255" y="20" width="170" height="52" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">Certificate Authority</text>
    <text class="ts" x="340" y="60" text-anchor="middle" dominant-baseline="central">ca.crt  (shared root)</text>
  </g>

  <!-- Arrow CA -> Broker -->
  <line x1="280" y1="72" x2="175" y2="148" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
  <text class="ts" x="192" y="118" text-anchor="middle">signs broker.crt</text>

  <!-- Arrow CA -> Client -->
  <line x1="400" y1="72" x2="505" y2="148" class="arr" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
  <text class="ts" x="492" y="118" text-anchor="middle">signs client.crt</text>

  <!-- Broker box -->
  <g class="c-teal">
    <rect x="50" y="150" width="210" height="80" rx="8" stroke-width="0.5"/>
    <text class="th" x="155" y="175" text-anchor="middle" dominant-baseline="central">ActiveMQ Artemis</text>
    <text class="ts" x="155" y="193" text-anchor="middle" dominant-baseline="central">keystore: broker.p12</text>
    <text class="ts" x="155" y="211" text-anchor="middle" dominant-baseline="central">truststore: truststore.p12</text>
  </g>

  <!-- Client box -->
  <g class="c-purple">
    <rect x="420" y="150" width="210" height="80" rx="8" stroke-width="0.5"/>
    <text class="th" x="525" y="175" text-anchor="middle" dominant-baseline="central">Client (.NET / CLI)</text>
    <text class="ts" x="525" y="193" text-anchor="middle" dominant-baseline="central">keystore: client.p12</text>
    <text class="ts" x="525" y="211" text-anchor="middle" dominant-baseline="central">truststore: truststore.p12</text>
  </g>

  <!-- mTLS handshake arrow bidirectional -->
  <line x1="262" y1="190" x2="418" y2="190" class="arr" marker-end="url(#arrow)" stroke-width="1.5"/>
  <line x1="418" y1="200" x2="262" y2="200" class="arr" marker-end="url(#arrow)" stroke-width="1.5"/>
  <text class="th" x="340" y="185" text-anchor="middle" dominant-baseline="central">mTLS</text>
  <text class="ts" x="340" y="210" text-anchor="middle" dominant-baseline="central">61616 (AMQP/CORE)</text>

  <!-- Ports -->
  <g class="c-gray">
    <rect x="50" y="250" width="210" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="155" y="272" text-anchor="middle" dominant-baseline="central">61616 SSL · 8161 web console</text>
  </g>

  <!-- Volumes -->
  <g class="c-gray">
    <rect x="420" y="250" width="210" height="36" rx="6" stroke-width="0.5"/>
    <text class="ts" x="525" y="272" text-anchor="middle" dominant-baseline="central">certs volume  →  /var/lib/artemis-instance/etc</text>
  </g>

  <!-- Mount arrow -->
  <line x1="260" y1="268" x2="418" y2="268" class="arr" stroke-dasharray="3 3" marker-end="url(#arrow)"/>
</svg>
